name: CI Check (Lint + Build)

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      # ✅ 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # ➡️ 2. Node.js 환경 설정
      - name: Setup Node.js (v24)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      # ➡️ 2-1. pnpm 특정 버전 설치 및 PATH 보장
      - name: Install pnpm (v10.13.1) and Verify PATH
        run: |
          npm install -g pnpm@10.13.1
          pnpm -v # 설치 확인
          
      # ✅ 3. 의존성 설치
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ✅ 4. Lint 및 Prettier 검사
      - name: Run ESLint and Prettier check
        run: |
          pnpm lint
          pnpm prettier --check "**/*.{ts,tsx,js,jsx,json,css,scss,md}"

      # ✅ 5. Build 테스트
      - name: Build
        run: pnpm build
